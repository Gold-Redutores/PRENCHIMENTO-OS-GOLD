<script>
        const URL_CSV_OS = 'https://raw.githubusercontent.com/Gold-Redutores/PRENCHIMENTO-OS-GOLD/main/dmsoser00000045.csv';
        const URL_CSV_PRODUTOS = 'https://raw.githubusercontent.com/Gold-Redutores/PRENCHIMENTO-OS-GOLD/refs/heads/main/relalisatagemprodutosdetada.csv';
        let dadosOS = []; let listaProdutos = [];

        // FUNÇÃO ULTRARRÁPIDA: Não trava o navegador mesmo com arquivos gigantescos
        function parseCSV(text) {
            if (!text) return [];
            const linhas = text.split(/\r?\n/);
            const resultado = [];

            for (let i = 0; i < linhas.length; i++) {
                let linha = linhas[i].trim();
                if (!linha) continue;

                // Fatiamento cirúrgico de strings para evitar travar a memória do navegador
                let partes = linha.split('","');
                if (partes.length < 5) {
                    partes = linha.split(';');
                }

                // Limpa resíduos de aspas fixas nas pontas de cada coluna
                const colunasLimpas = partes.map(c => c.replace(/^"+|"+$/g, '').trim());
                resultado.push(colunasLimpas);
            }
            return resultado;
        }

        async function carregarDados() {
            const status = document.getElementById('db-status');
            try {
                const [resOS, resProd] = await Promise.all([ fetch(URL_CSV_OS), fetch(URL_CSV_PRODUTOS) ]);
                
                dadosOS = parseCSV(await resOS.text());
                listaProdutos = parseCSV(await resProd.text());
                
                status.innerText = "✅ GitHub Sincronizado!";
                status.style.color = "green";
                console.log("Produtos carregados:", listaProdutos.length);
            } catch (e) {
                status.innerText = "❌ Erro na sincronização.";
                status.style.color = "red";
                console.error("Erro ao carregar dados:", e);
            }
        }

        function buscarDadosOS() {
            const osVal = document.getElementById('input-os').value.trim();
            if (osVal.length < 3) return;
            
            // Busca a OS baseada na coluna correspondente
            const linha = dadosOS.find(l => l && l.length > 5 && l.join(" ").includes(osVal));
            if (linha) {
                // Adapte os índices abaixo baseados na estrutura do seu dmsoser00000045.csv se necessário
                const campoSerie = document.getElementById('campo-serie');
                const campoRedutor = document.getElementById('campo-redutor');
                const campoCliente = document.getElementById('campo-cliente');

                // Procura genérica se os índices mudarem de posição no arquivo de OS
                if (campoSerie) { campoSerie.value = linha[23] || ""; campoSerie.setAttribute('value', campoSerie.value); }
                if (campoRedutor) { campoRedutor.value = linha[24] || ""; campoRedutor.setAttribute('value', campoRedutor.value); }
                if (campoCliente) { campoCliente.value = linha[26] || linha[5] || ""; campoCliente.setAttribute('value', campoCliente.value); }
            }
        }

        function criarLinhaPeca() {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="autocomplete-wrapper">
                    <input type="text" class="input-nome-peca" placeholder="Busca global...">
                    <div class="suggestions"></div>
                </td>
                <td><input type="number" value="1" style="text-align:center;" oninput="this.setAttribute('value', this.value)"></td>
                <td><input type="text" class="cod-gold" readonly style="text-align:center;"></td>
            `;
            const input = tr.querySelector('.input-nome-peca');
            const sugestoes = tr.querySelector('.suggestions');
            const codInput = tr.querySelector('.cod-gold');

            input.addEventListener('input', function() {
                const busca = this.value.toLowerCase();
                sugestoes.innerHTML = '';
                if (busca.length < 2) { sugestoes.style.display = 'none'; return; }
                const termos = busca.split('%').map(t => t.trim()).filter(t => t !== "");
                
                // Mapeia e localiza os produtos de forma ultra-otimizada
                const filtrados = listaProdutos.filter(p => {
                    if (!p || p.length < 4) return false;
                    const linhaTexto = p.join(" ").toLowerCase();
                    return termos.every(t => linhaTexto.includes(t));
                }).slice(0, 15);

                if (filtrados.length > 0) {
                    sugestoes.style.display = 'block';
                    filtrados.forEach(p => {
                        // Identifica inteligentemente onde está o código puro e a descrição real
                        let codigo = p.find(c => c.match(/^(VG\d+|000\d+|[A-Z]{2,}\d+|\d{6,})/i)) || "S/C";
                        let nome = p.find(c => c.length > 5 && !c.includes("Listagem") && !c.includes("ATIVO") && c !== codigo) || "Sem Descrição";

                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        div.innerText = `${codigo} | ${nome}`;
                        
                        div.onclick = () => {
                            input.value = nome; input.setAttribute('value', nome);
                            codInput.value = codigo; codInput.setAttribute('value', codigo);
                            sugestoes.style.display = 'none';
                            if (tr === document.querySelector('#tabela-pecas tr:last-child')) criarLinhaPeca();
                        };
                        sugestoes.appendChild(div);
                    });
                } else { sugestoes.style.display = 'none'; }
            });
            document.getElementById('tabela-pecas').appendChild(tr);
        }

        function previewFotos(e) {
            for (let f of e.target.files) {
                const r = new FileReader();
                r.onload = ev => {
                    const d = document.createElement('div');
                    d.className = 'foto-item';
                    d.innerHTML = `
                        <button class="btn-remove no-print" onclick="this.parentElement.remove()">X</button>
                        <img src="${ev.target.result}" class="foto-preview">
                        <textarea rows="3" placeholder="Parecer..." oninput="this.innerHTML = this.value"></textarea>
                    `;
                    document.getElementById('container-fotos').appendChild(d);
                };
                r.readAsDataURL(f);
            }
        }

        function prepararHTML() {
            document.querySelectorAll('input').forEach(i => i.setAttribute('value', i.value));
            document.querySelectorAll('textarea').forEach(t => t.innerHTML = t.value);
            return "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
        }

        function salvarHTML() {
            const os = document.getElementById('input-os').value || "SN";
            const cliente = document.getElementById('campo-cliente').value || "RELATORIO";
            const conteudo = prepararHTML();
            const blob = new Blob([conteudo], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `OS_${os}_${cliente}.html`;
            link.click();
        }

        function enviarWhatsApp() {
            const conteudo = prepararHTML();
            const os = document.getElementById('input-os').value || "SN";
            const cliente = document.getElementById('campo-cliente').value || "RELATORIO";
            const blob = new Blob([conteudo], { type: 'text/html' });
            const arquivo = new File([blob], `OS_${os}_${cliente}.html`, { type: 'text/html' });

            if (navigator.share) {
                navigator.share({ title: `Relatório OS ${os}`, files: [arquivo] }).catch(console.error);
            } else {
                alert("Navegador não suporta compartilhamento. Use 'Salvar Arquivo'.");
            }
        }

        function calcularTotal() {
            let t = 0; 
            document.querySelectorAll('.hr-input').forEach(i => {
                t += (parseFloat(i.value) || 0);
                i.setAttribute('value', i.value);
            });
            document.getElementById('total-horas').innerText = t;
        }

        window.onclick = e => { if (!e.target.matches('.input-nome-peca')) document.querySelectorAll('.suggestions').forEach(s => s.style.display = 'none'); }

        window.onload = () => {
            document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-BR');
            carregarDados();
            criarLinhaPeca();
        };
    </script>
